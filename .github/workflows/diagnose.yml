name: Diagnose npm token

on: workflow_dispatch

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'
      - name: whoami (which npm user does NPM_TOKEN authenticate as?)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "=== npm whoami ==="
          npm whoami || echo "(whoami failed — token may be invalid)"
          echo
          echo "=== npm access list packages (what can this user write to?) ==="
          npm access list packages || echo "(failed)"
          echo
          echo "=== npm access list collaborators @allstak/js (control: works) ==="
          npm access list collaborators @allstak/js || echo "(failed)"
          echo
          echo "=== npm access list collaborators @allstak/react (failing) ==="
          npm access list collaborators @allstak/react || echo "(failed)"
          echo
          echo "=== npm access list collaborators @allstak/react-native (failing) ==="
          npm access list collaborators @allstak/react-native || echo "(failed)"
